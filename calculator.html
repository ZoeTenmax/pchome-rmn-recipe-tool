<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PChome RMN 廣告預算計算器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f8fafc;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
      "react/": "https://esm.sh/react@^19.2.3/",
      "react": "https://esm.sh/react@^19.2.3",
      "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
      "recharts": "https://esm.sh/recharts@^3.6.0"
    }
  }
  </script>
  <script type="module" crossorigin src="https://amberwu-tmx.github.io/PChome-budget-tool/assets/index-4VXbMzCZ.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    (() => {
      const allowedMessageOrigins = new Set([
        'https://zoetenmax.github.io',
        'http://127.0.0.1:8123',
        'http://localhost:8123'
      ]);
      const inputNames = {
        keyword: 'keywordTotalBudget',
        banner: 'bannerTotalBudget',
        recommend: 'siteWideTotalBudget',
        brand: 'brandSalesTotalBudget',
        start: 'startDate',
        end: 'endDate'
      };
      let prefillApplied = false;

      const validIsoDate = value => {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(value || '')) return false;
        const date = new Date(`${value}T00:00:00Z`);
        return !Number.isNaN(date.getTime()) && date.toISOString().slice(0, 10) === value;
      };
      const validBudget = value => {
        if (value === null || value === undefined || value === '') return null;
        const amount = Number(value);
        if (!Number.isFinite(amount) || amount < 0 || amount > 1000000000) return null;
        return Math.round(amount);
      };
      const normalizePayload = payload => {
        if (!payload || payload.source !== 'recipe' || String(payload.version) !== '1') return null;
        const normalized = { budgets: {} };
        Object.keys(inputNames).filter(key => !['start', 'end'].includes(key)).forEach(key => {
          const amount = validBudget(payload[key]);
          if (amount !== null) normalized.budgets[key] = amount;
        });
        if (validIsoDate(payload.start) && validIsoDate(payload.end) && payload.start <= payload.end) {
          normalized.start = payload.start;
          normalized.end = payload.end;
        }
        return Object.keys(normalized.budgets).length || normalized.start ? normalized : null;
      };
      const setControlledValue = (input, value) => {
        const setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
        setter.call(input, String(value));
        input.dispatchEvent(new Event('input', { bubbles: true }));
        input.dispatchEvent(new Event('change', { bubbles: true }));
      };
      const applyPayload = payload => {
        if (prefillApplied) return true;
        const normalized = normalizePayload(payload);
        if (!normalized) return false;
        const inputs = Object.fromEntries(
          Object.entries(inputNames).map(([key, name]) => [key, document.querySelector(`input[name="${name}"]`)])
        );
        if (!inputs.keyword || !inputs.banner || !inputs.recommend || !inputs.brand || !inputs.start || !inputs.end) return false;

        Object.entries(normalized.budgets).forEach(([key, amount]) => setControlledValue(inputs[key], amount));
        if (normalized.start && normalized.end) {
          if (normalized.start <= inputs.end.value) {
            setControlledValue(inputs.start, normalized.start);
            setControlledValue(inputs.end, normalized.end);
          } else {
            setControlledValue(inputs.end, normalized.end);
            setControlledValue(inputs.start, normalized.start);
          }
        }
        prefillApplied = true;
        document.documentElement.dataset.recipePrefill = 'applied';
        return true;
      };
      const applyWhenReady = (payload, onApplied) => {
        let attempts = 0;
        const tryApply = () => {
          if (applyPayload(payload)) {
            if (onApplied) onApplied();
            return;
          }
          if (++attempts < 180) requestAnimationFrame(tryApply);
        };
        tryApply();
      };
      const params = new URLSearchParams(window.location.search);
      applyWhenReady({
        source: params.get('rmn_source'),
        version: params.get('rmn_v'),
        start: params.get('rmn_start'),
        end: params.get('rmn_end'),
        keyword: params.get('rmn_keyword'),
        banner: params.get('rmn_banner'),
        recommend: params.get('rmn_recommend'),
        brand: params.get('rmn_brand')
      });
      window.addEventListener('message', event => {
        if (!allowedMessageOrigins.has(event.origin) || event.data?.type !== 'pchome-rmn-calculator-prefill') return;
        applyWhenReady(event.data.payload, () => {
          event.source?.postMessage({
            type: 'pchome-rmn-calculator-prefill-applied',
            token: event.data.token
          }, event.origin);
        });
      });
    })();
  </script>
</body>
</html>
